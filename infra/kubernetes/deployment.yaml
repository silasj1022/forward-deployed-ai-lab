apiVersion: apps/v1
kind: Deployment
metadata:
  name: forward-deployed-ai-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forward-deployed-ai-lab
  template:
    metadata:
      labels:
        app: forward-deployed-ai-lab
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/replace-with-owner/forward-deployed-ai-lab:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: fdai-lab-config
            - secretRef:
                name: fdai-lab-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime
              mountPath: /app/logs
            - name: runtime
              mountPath: /app/artifacts
      volumes:
        - name: runtime
          emptyDir: {}
