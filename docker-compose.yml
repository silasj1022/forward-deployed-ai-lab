services:
  enterprise-agent-foundry:
    build: .
    image: enterprise-agent-foundry:local
    container_name: enterprise-agent-foundry
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      FDAI_ENVIRONMENT: local
      FDAI_MODEL_PROVIDER: deterministic
    volumes:
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    profiles: ["mlops"]
    command: >-
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  mlflow-data:
