image: python:3.12-slim

stages: [quality, evaluate]

before_script:
  - python -m pip install --upgrade pip
  - pip install -e ".[dev]"

quality:
  stage: quality
  script:
    - ruff check .
    - pytest --cov=forward_deployed_ai_lab --cov-report=xml
  artifacts:
    when: always
    paths: [coverage.xml]

evaluate:
  stage: evaluate
  script:
    - python scripts/evaluate.py
    - python scripts/red_team.py
  artifacts:
    when: always
    paths:
      - artifacts/evaluation-report.json
      - artifacts/red-team-report.json
