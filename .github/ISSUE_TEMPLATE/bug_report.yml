name: Bug report
description: Report a reproducible defect in the public reference implementation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, personal data, customer data, or security-sensitive production details.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest synthetic example that reproduces the behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project and Python version
      placeholder: "0.4.0 / Python 3.13"
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Share relevant test or benchmark output after removing sensitive information.
