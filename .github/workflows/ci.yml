name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Verify repository evidence
        run: python scripts/verify_repository.py
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy src/forward_deployed_ai_lab
      - name: Test
        run: pytest --cov=forward_deployed_ai_lab --cov-report=xml --cov-report=term
      - name: Synthetic benchmark
        run: python scripts/evaluate.py
      - name: Red-team gate
        run: python scripts/red_team.py
      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evaluation-python-${{ matrix.python-version }}
          if-no-files-found: error
          path: |
            artifacts/evaluation-report.json
            artifacts/red-team-report.json
            coverage.xml

  container:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build container
        run: docker build -t enterprise-agent-foundry:${{ github.sha }} .
      - name: Smoke-test container
        run: |
          docker run --detach --name enterprise-agent-foundry-ci -p 3000:3000 enterprise-agent-foundry:${{ github.sha }}
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/api/v1/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs enterprise-agent-foundry-ci
          exit 1

  package:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build wheel and source distribution
        run: python -m pip install --upgrade pip build && python -m build
      - name: Clean-install and smoke-test wheel
        run: |
          python -m venv /tmp/eaf-wheel
          /tmp/eaf-wheel/bin/pip install dist/*.whl
          /tmp/eaf-wheel/bin/python scripts/installed_package_smoke.py
      - name: Clean-install and smoke-test source distribution
        run: |
          python -m venv /tmp/eaf-sdist
          /tmp/eaf-sdist/bin/pip install dist/*.tar.gz
          /tmp/eaf-sdist/bin/python scripts/installed_package_smoke.py
      - name: Upload candidate distributions
        uses: actions/upload-artifact@v7
        with:
          name: enterprise-agent-foundry-candidate-distributions
          if-no-files-found: error
          path: dist/*
