name: Enterprise Agent Foundry Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-attest:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build cyclonedx-bom
          python -m build
      - name: Clean-install and smoke-test wheel
        run: |
          python -m venv /tmp/eaf-wheel
          /tmp/eaf-wheel/bin/pip install dist/*.whl
          /tmp/eaf-wheel/bin/python scripts/installed_package_smoke.py
      - name: Clean-install and smoke-test source distribution
        run: |
          python -m venv /tmp/eaf-sdist
          /tmp/eaf-sdist/bin/pip install dist/*.tar.gz
          /tmp/eaf-sdist/bin/python scripts/installed_package_smoke.py
      - name: Generate CycloneDX SBOM and SHA256 checksums
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          cyclonedx-py environment /tmp/eaf-wheel/bin/python \
            --pyproject pyproject.toml \
            --output-reproducible \
            --output-format JSON \
            --output-file dist/enterprise-agent-foundry-${SAFE_REF}.cdx.json
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Attest distribution provenance
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"
      - name: Upload release bundle
        uses: actions/upload-artifact@v7
        with:
          name: enterprise-agent-foundry-release-bundle
          if-no-files-found: error
          path: dist/*
      - name: Create GitHub release with verified assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --verify-tag
          --generate-notes
          --title "Enterprise Agent Foundry ${GITHUB_REF_NAME}"
