version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # v1.0 is publicly verified only on Python 3.11-3.13.
      # Remove this guard only after Python 3.14 joins the tested runtime matrix.
      - dependency-name: python
        versions:
          - ">= 3.14"
